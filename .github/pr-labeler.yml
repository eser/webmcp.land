# Labeler configuration for actions/labeler
# Auto-labels PRs based on changed file paths

documentation:
  - changed-files:
      - any-glob-to-any-file:
          - "*.md"
          - "docs/**"

api:
  - changed-files:
      - any-glob-to-any-file:
          - "src/app/api/**"

frontend:
  - changed-files:
      - any-glob-to-any-file:
          - "src/components/**"
          - "src/app/(auth)/**"
          - "src/app/registry/**"
          - "src/app/admin/**"

database:
  - changed-files:
      - any-glob-to-any-file:
          - "drizzle/**"
          - "src/lib/schema.ts"
          - "src/lib/db.ts"
          - "drizzle.config.ts"

infrastructure:
  - changed-files:
      - any-glob-to-any-file:
          - "Dockerfile"
          - "compose.yml"
          - "docker/**"
          - ".github/workflows/**"
